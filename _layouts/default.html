<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              paper: "#f3f11c",
              ink: "#121212",
              accent: "#ef2e17",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}" />
  </head>
  <body class="bg-paper text-ink min-h-screen">
    <div class="mx-auto max-w-[1200px] px-4 sm:px-6 md:px-8 pt-5 md:pt-8 pb-16">
      <header class="flex flex-col sm:flex-row items-start justify-between gap-4 sm:gap-6 mb-8 sm:mb-12 md:mb-20">
        <nav aria-label="Main" class="shrink-0">
          <ul class="flex flex-row sm:flex-col gap-3 sm:gap-0 sm:space-y-1 md:space-y-2 text-[16px] sm:text-[20px] md:text-[26px] leading-[1.05]">
            {% assign nav_pages = site.pages | where_exp: "item", "item.nav_order" | sort: "nav_order" %}
            {% for item in nav_pages %}
              <li>
                <a
                  href="{{ item.url | relative_url }}"
                  class="nav-link {% if item.url == page.url %}text-accent{% else %}text-ink{% endif %}"
                >
                  {{ item.nav_label | default: item.title }}
                </a>
              </li>
            {% endfor %}
          </ul>
        </nav>

        <a href="{{ '/' | relative_url }}" class="flex items-start gap-3 md:gap-5">
          <img
            src="{{ '/assets/hana-white.png' | relative_url }}"
            alt="Hana White"
            class="w-[100px] sm:w-[140px] md:w-[220px] h-auto"
          />
          <img
            src="{{ '/assets/headshot.png' | relative_url }}"
            alt="Portrait of Hana"
            class="w-[44px] sm:w-[58px] md:w-[72px] h-auto border border-black/10"
          />
        </a>
      </header>

      <main class="content max-w-[900px] ml-0 md:ml-[76px] text-[15px] sm:text-[17px] md:text-[20px] leading-[1.5] sm:leading-[1.45] md:leading-[1.4]">
        {{ content }}
      </main>
    </div>
  </body>
</html>
